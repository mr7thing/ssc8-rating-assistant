<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../styles/shared.css">
    <style>
        body {
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background: #0f0f13;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid var(--ssc8-border);
            background: rgba(255, 255, 255, 0.02);
        }

        .tab-btn {
            flex: 1;
            padding: 14px;
            border: none;
            background: none;
            color: var(--ssc8-text);
            opacity: 0.5;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            opacity: 1;
            color: var(--ssc8-accent);
            border-bottom: 2px solid var(--ssc8-accent);
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .config-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--ssc8-border);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
        }

        .config-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .config-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--ssc8-border);
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
        }

        .btn-primary {
            background: var(--ssc8-accent);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: filter 0.2s;
        }

        .btn-primary:active {
            filter: brightness(0.8);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--ssc8-accent);
            color: var(--ssc8-accent);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div class="tabs">
        <button class="tab-btn active" data-tab="ranking">排行榜</button>
        <button class="tab-btn" data-tab="config">评分配置</button>
    </div>

    <!-- 排行榜 Tab -->
    <div id="ranking" class="tab-content active">
        <div id="ranked-songs"></div>
    </div>

    <!-- 维度配置 Tab -->
    <div id="config" class="tab-content">
        <div id="dimensions-list"></div>
        <button id="add-dim" class="btn-outline" style="width: 100%; margin-top: 10px;">+ 添加新维度</button>
        <div style="margin-top: 20px;">
            <button id="save-config" class="btn-primary" style="width: 100%;">保存配置并应用</button>
        </div>

        <!-- 数据管理区 -->
        <div style="margin-top: 30px; border-top: 1px solid var(--ssc8-border); padding-top: 20px;">
            <div style="display: flex; gap: 10px;">
                <button id="export-csv" class="btn-outline" style="flex: 1">导出 CSV</button>
                <button id="clear-data" class="btn-outline"
                    style="flex: 1; border-color:#ef4444; color:#ef4444">清除全部评分</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
